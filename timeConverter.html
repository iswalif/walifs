<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send WhatsApp Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #128C7E;
        }
        .note {
            margin-top: 20px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h2>Send WhatsApp Message</h2>
    <p>Enter your message below:</p>
    <textarea id="message" placeholder="Type your message here..."></textarea>
    <br>
    <button onclick="sendMessage()">Send via WhatsApp</button>
    <p class="note">The message will be sent to <strong>+8801761149535</strong> (01761149535).<br>WhatsApp will open with the pre‑filled text – just tap send.</p>

    <script>
        function sendMessage() {
            const message = document.getElementById('message').value.trim();
            if (!message) {
                alert('Please enter a message.');
                return;
            }

            // Target number: +8801761149535 → without '+' for the link
            const phoneNumber = '8801761149535';
            const encodedMessage = encodeURIComponent(message);
            const url = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

            // Open WhatsApp
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
