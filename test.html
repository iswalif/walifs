<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>image · paste & view</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #0e0e0e;
      color: #e5e5e5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: lowercase;
      opacity: 0.75;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
      padding: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .url-input {
      background: transparent;
      border: none;
      color: #e5e5e5;
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 13px;
      letter-spacing: 0.1em;
      min-width: 260px;
      font-family: inherit;
    }

    .url-input:focus {
      outline: none;
      background: rgba(229,229,229,0.1);
    }

    .url-input::placeholder {
      color: #e5e5e5;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    .btn {
      background: transparent;
      border: none;
      color: #e5e5e5;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: #e5e5e5;
      color: #0e0e0e;
    }

    .image-card {
      border: none;
      border-radius: 32px;
      padding: 32px 28px;
      max-width: 600px;
      width: 100%;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .image-display {
      width: 100%;
      height: 320px;
      border-radius: 28px;
      background-color: #1a1a1a;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      box-shadow: 0 0 0 1px rgba(229,229,229,0.05);
    }

    .placeholder {
      background: rgba(20,20,20,0.8);
      backdrop-filter: blur(4px);
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: #e5e5e5;
      border: 1px solid rgba(229,229,229,0.15);
      text-transform: lowercase;
    }

    .error-msg {
      border: none;
      color: #e5e5e5;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-align: center;
      background: rgba(229,229,229,0.05);
      margin-bottom: 10px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(229,229,229,0.3);
      border-radius: 50%;
      border-top-color: #e5e5e5;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .image-card { padding: 20px; }
      .image-display { height: 240px; }
      .url-input { min-width: 200px; }
    }
  </style>
</head>
<body>
  <nav>
    <div>image viewer</div>
    <div>paste & show</div>
  </nav>

  <main>
    <div class="input-row">
      <input type="text" id="imageUrlInput" class="url-input" placeholder="image URL" value="">
      <button class="btn" id="loadBtn" aria-label="load image"><i class="fa-solid fa-eye"></i></button>
    </div>

    <div id="errorBox" class="error-msg" style="display: none;"></div>

    <div class="image-card">
      <div class="image-display" id="imageDisplay">
        <span id="placeholderText" class="placeholder">paste url ↑</span>
      </div>
      <div style="text-align: center; font-size: 12px; letter-spacing: 0.2em; opacity: 0.5; text-transform: lowercase; padding-top: 8px;">
        image shows above
      </div>
    </div>

    <div id="loadingSpinner" style="display: none;"><div class="spinner"></div></div>
  </main>

  <script>
    const urlInput = document.getElementById('imageUrlInput');
    const loadBtn = document.getElementById('loadBtn');
    const imageDisplay = document.getElementById('imageDisplay');
    const placeholder = document.getElementById('placeholderText');
    const errorBox = document.getElementById('errorBox');
    const spinner = document.getElementById('loadingSpinner');

    function showError(text) {
      errorBox.style.display = 'block';
      errorBox.textContent = text;
      setTimeout(() => {
        errorBox.style.display = 'none';
      }, 3000);
    }

    function setLoading(state) {
      spinner.style.display = state ? 'flex' : 'none';
    }

    function extractGoogleDriveFileId(url) {
      if (!url || typeof url !== 'string') return null;
      
      const patterns = [
        /\/file\/d\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /\/open\?id=([a-zA-Z0-9_-]+)/,
        /\/d\/([a-zA-Z0-9_-]+)/
      ];
      
      for (let pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      
      if (/^[a-zA-Z0-9_-]{15,}$/.test(url)) {
        return url;
      }
      
      return null;
    }

    function isGoogleDriveLink(url) {
      return url.includes('drive.google.com') || extractGoogleDriveFileId(url) !== null;
    }

    function convertToDirectImageUrl(url) {
      const fileId = extractGoogleDriveFileId(url);
      if (fileId) {
        return `https://drive.google.com/uc?export=view&id=${fileId}`;
      }
      return url;
    }

    function loadImageFromUrl(inputUrl) {
      if (!inputUrl.trim()) {
        showError('please paste an image link');
        return;
      }

      setLoading(true);
      errorBox.style.display = 'none';

      const finalUrl = convertToDirectImageUrl(inputUrl.trim());
      
      const img = new Image();
      img.crossOrigin = 'anonymous';
      
      img.onload = () => {
        imageDisplay.style.backgroundImage = `url('${finalUrl}')`;
        placeholder.style.display = 'none';
        setLoading(false);
      };
      
      img.onerror = () => {
        if (isGoogleDriveLink(inputUrl)) {
          const fileId = extractGoogleDriveFileId(inputUrl);
          const alternativeUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
          
          const altImg = new Image();
          altImg.crossOrigin = 'anonymous';
          altImg.onload = () => {
            imageDisplay.style.backgroundImage = `url('${alternativeUrl}')`;
            placeholder.style.display = 'none';
            setLoading(false);
          };
          altImg.onerror = () => {
            imageDisplay.style.backgroundImage = 'none';
            placeholder.style.display = 'flex';
            setLoading(false);
            showError('image not found or invalid link');
          };
          altImg.src = alternativeUrl;
        } else {
          imageDisplay.style.backgroundImage = 'none';
          placeholder.style.display = 'flex';
          setLoading(false);
          showError('image not found or invalid link');
        }
      };
      
      img.src = finalUrl;
    }

    loadBtn.addEventListener('click', () => {
      loadImageFromUrl(urlInput.value);
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loadImageFromUrl(urlInput.value);
      }
    });

    urlInput.focus();
  </script>
</body>
</html>
