<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Website Widget</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{
      --widget-width: clamp(14rem, 22vw, 18rem);
      --expanded-width: clamp(20rem, 40vw, 32rem);
      --radius: 1rem;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --bg-light: #f9f9f9;
      --border-light: #eee;
    }

    body{
      min-height:200vh;
      font-family: 'Courier New', Courier, monospace;
      background: linear-gradient(145deg, #f0f2f5 0%, #eef0f3 100%);
      margin:0;
    }

    .floating-widget{
      position:fixed;
      top:20vh;
      left:70vw;
      z-index:9999;
      display:flex;
      flex-direction:column;
      transition:
        width .0s ease,
        height .0s ease,
        transform .0s ease,
        opacity .0s ease;
    }

    .state-notch{
      width:3rem;
      height:3rem;
    }
    .state-mini{
      width:var(--widget-width);
		
    }
    .state-expanded{
      width:var(--expanded-width);
      height:60vh;
      max-height:80vh;
    }

    .notch{
      width:100%;
      height:100%;
      border-radius:50%;
      background:#111;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:var(--shadow);
      font-size:1.2rem;
    }

    .window{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      border-radius:var(--radius);
      background:white;
      box-shadow:var(--shadow);
      overflow:hidden;
      transform-origin:bottom right;
    }

    .header{
      padding:.6rem;
      cursor:grab;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#f3f3f3;
      user-select: none;
    }
    .header button{
      border:none;
      background:none;
      cursor:pointer;
      font-size:1rem;
    }

    .mini-content{
      padding:1.2rem;
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:0 rem;
    }
    .mini-content button{
      padding:.5rem .8rem;
      border:none;
      border-radius:.5rem;
      background:#111;
      color:white;
      cursor:pointer;
    }

    .expanded-content {
      flex:1;
      overflow-y: auto;
      padding: 1.2rem 1rem;
      background: white;
      scroll-behavior: smooth;
      font-family: 'Courier New', Courier, monospace;
    }

    .receipt {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: #fefefe;
      padding: 0.8rem;
    }

    .receipt-header {
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      border-bottom: 2px dashed #aaa;
      padding-bottom: 0.5rem;
    }

    .receipt-section {
      margin-top: 0.3rem;
    }
    .receipt-section-title {
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      border-bottom: 1px dotted #aaa;
      padding-bottom: 0.2rem;
      margin-bottom: 0.5rem;
    }

    .receipt-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .receipt-dots {
      flex: 1;
      border-bottom: 1px dotted #aaa;
      margin: 0 0.4rem 0.3rem 0.4rem;
    }

    .receipt-note {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      margin-top: 0.5rem;
      border-top: 1px dashed #ccc;
      padding-top: 0.5rem;
    }

    .client-info {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin: 1rem 0 0.5rem;
    }
    .client-info input {
      padding: 0.6rem 0.8rem;
      border: none;
      background: #f1f1f1;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 0;
    }
    .client-info input:focus {
      outline: 1px solid #aaa;
    }

    .action-buttons {
      display: flex;
      gap: 0.8rem;
      margin: 0.8rem 0 0.2rem;
    }
    .action-buttons button {
      flex: 1;
      padding: 0.6rem 0.2rem;
      border: none;
      background: transparent;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
      color: #111;
    }
    .action-buttons .secondary {
      color: #333;
    }
    .action-buttons button:hover {
      background: #f1f1f1;
    }

    .counter-window {
      position: fixed;
      top: 30vh;
      left: 50vw;
      width: 18rem;
      background: white;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      z-index: 10000;
      display: none;
      flex-direction: column;
      font-family: 'Courier New', Courier, monospace;
    }
    .counter-window.visible {
      display: flex;
    }
    .counter-header {
      padding: 0.6rem;
      cursor: grab;
      background: #f3f3f3;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .counter-header span {
      font-weight: bold;
    }
    .counter-header button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .counter-content {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .counter-content label {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .counter-content input,
    .counter-content textarea {
      padding: 0.6rem 0.8rem;
      border: none;
      background: #f1f1f1;
      font-family: inherit;
      font-size: 0.9rem;
      width: 100%;
      box-sizing: border-box;
    }
    .counter-content textarea {
      min-height: 70px;
      resize: vertical;
    }
    #sendCounterOfferBtn {
      background: #111;
      color: white;
      border: none;
      padding: 0.7rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    #sendCounterOfferBtn:hover {
      background: #2a2a2a;
    }

    .hidden{
      display:none !important;
    }
  </style>
</head>
<body>

<div id="widget" class="floating-widget state-mini">

  <div id="notch" class="notch hidden">
    <i class="fas fa-shopping-cart"></i>
  </div>

  <div id="window" class="window">

    <div id="dragHandle" class="header">
      <span>☰</span>
      <button id="closeBtn">✕</button>
    </div>

    <div id="miniContent" class="mini-content">
      <h3>This website is a demo</h3>
      <button id="expandBtn">Own this site</button>
    </div>

    <div id="expandedContent" class="expanded-content hidden">
      <div class="receipt">

        <div class="receipt-header">WEBSITE RECEIPT</div>

        <div class="receipt-section">
          <div class="receipt-section-title">base creation</div>
          <div class="receipt-item">
            <span>one‑time design & build</span>
            <span class="receipt-dots"></span>
            <span id="basePrice">৳15,000</span>
          </div>
        </div>

        <div class="receipt-section">
          <div class="receipt-section-title">yearly amenities</div>
          <div class="receipt-item">
            <span>hosting</span>
            <span class="receipt-dots"></span>
            <span id="hostingPrice">৳3,000</span>
          </div>
          <div class="receipt-item">
            <span>domain</span>
            <span class="receipt-dots"></span>
            <span id="domainPrice">৳1,200</span>
          </div>
        </div>

        <div class="receipt-section">
          <div class="receipt-section-title">per‑use feature</div>
          <div class="receipt-item">
            <span>SMS (SSL Wireless)</span>
            <span class="receipt-dots"></span>
            <span id="smsPrice">৳0.30/msg</span>
          </div>
        </div>

        <div class="receipt-note">* everything you need to start — no hidden fees</div>

        <div class="client-info">
          <input type="text" id="clientName" placeholder="Your name">
          <input type="text" id="clientBusiness" placeholder="Business name">
          <input type="text" id="clientPhone" placeholder="Phone number">
        </div>

        <div class="action-buttons">
          <button id="sendRequestBtn" class="primary">Send Request</button>
          <button id="counterOfferBtn" class="secondary">Make Counter Offer</button>
        </div>

      </div> 
    </div> 

  </div> 
</div> 

<div id="counterWindow" class="counter-window">
  <div class="counter-header" id="counterDragHandle">
    <span>✎ counter offer</span>
    <button id="closeCounterBtn">✕</button>
  </div>
  <div class="counter-content">
    <label>Your offer (৳)</label>
    <input type="number" id="offerPrice" placeholder="e.g. 12000" min="0">
    <label>Message (optional)</label>
    <textarea id="offerMessage" placeholder="Write your negotiation message..."></textarea>
    <button id="sendCounterOfferBtn">Send Counter Offer</button>
  </div>
</div>

<script>
  (function() {
    const PRICES = {
      base: 15000,
      sms: 0.30,
      hosting: 3000,
      domain: 1200
    };
    const WHATSAPP_NUMBER = '8801761149535';

    const widget = document.getElementById("widget");
    const notch = document.getElementById("notch");
    const windowEl = document.getElementById("window");
    const miniContent = document.getElementById("miniContent");
    const expandedContent = document.getElementById("expandedContent");
    const expandBtn = document.getElementById("expandBtn");
    const closeBtn = document.getElementById("closeBtn");

    const basePriceSpan = document.getElementById("basePrice");
    const smsPriceSpan = document.getElementById("smsPrice");
    const hostingPriceSpan = document.getElementById("hostingPrice");
    const domainPriceSpan = document.getElementById("domainPrice");

    const clientName = document.getElementById("clientName");
    const clientBusiness = document.getElementById("clientBusiness");
    const clientPhone = document.getElementById("clientPhone");

    const sendRequestBtn = document.getElementById("sendRequestBtn");
    const counterOfferBtn = document.getElementById("counterOfferBtn");

    const counterWindow = document.getElementById("counterWindow");
    const closeCounterBtn = document.getElementById("closeCounterBtn");
    const offerPrice = document.getElementById("offerPrice");
    const offerMessage = document.getElementById("offerMessage");
    const sendCounterOfferBtn = document.getElementById("sendCounterOfferBtn");
    const counterDragHandle = document.getElementById("counterDragHandle");

    function updatePriceDisplay() {
      if (basePriceSpan) basePriceSpan.textContent = `৳${PRICES.base.toLocaleString()}`;
      if (smsPriceSpan) smsPriceSpan.textContent = `৳${PRICES.sms}/msg`;
      if (hostingPriceSpan) hostingPriceSpan.textContent = `৳${PRICES.hosting.toLocaleString()}`;
      if (domainPriceSpan) domainPriceSpan.textContent = `৳${PRICES.domain.toLocaleString()}`;
    }
    updatePriceDisplay();

    let state = "mini";

    function setState(newState) {
      const rect = widget.getBoundingClientRect();
      let left = parseFloat(widget.style.left) || rect.left;
      let top = parseFloat(widget.style.top) || rect.top;

      widget.classList.remove("state-notch", "state-mini", "state-expanded");
      state = newState;
      widget.classList.add(
        state === "notch" ? "state-notch" :
        state === "mini" ? "state-mini" : "state-expanded"
      );

      if (state === "notch") {
        notch.classList.remove("hidden");
        windowEl.classList.add("hidden");
      } else {
        notch.classList.add("hidden");
        windowEl.classList.remove("hidden");

        if (state === "mini") {
          miniContent.classList.remove("hidden");
          expandedContent.classList.add("hidden");
        } else {
          miniContent.classList.add("hidden");
          expandedContent.classList.remove("hidden");
        }
      }

      setTimeout(() => {
        const newRect = widget.getBoundingClientRect();
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let newLeft = left;
        let newTop = top;

        if (newLeft + newRect.width > vw) {
          newLeft = vw - newRect.width;
        }
        if (newLeft < 0) newLeft = 0;

        if (newTop + newRect.height > vh) {
          newTop = vh - newRect.height;
        }
        if (newTop < 0) newTop = 0;

        widget.style.left = newLeft + 'px';
        widget.style.top = newTop + 'px';
      }, 10);
    }

    expandBtn.onclick = () => setState("expanded");
    closeBtn.onclick = () => setState("notch");
    notch.onclick = () => setState("mini");

    const dragHandle = document.getElementById("dragHandle");
    let isDragging = false;
    let offsetX = 0, offsetY = 0;

    function startDrag(e) {
      isDragging = true;
      const rect = widget.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;
    }

    function drag(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      let x = clientX - offsetX;
      let y = clientY - offsetY;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const rect = widget.getBoundingClientRect();
      const maxX = vw - rect.width;
      const maxY = vh - rect.height;
      x = Math.max(0, Math.min(x, maxX));
      y = Math.max(0, Math.min(y, maxY));
      widget.style.left = x + "px";
      widget.style.top = y + "px";
    }

    function stopDrag() { isDragging = false; }

    dragHandle.addEventListener("mousedown", startDrag);
    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    dragHandle.addEventListener("touchstart", startDrag);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("touchend", stopDrag);
    notch.addEventListener("mousedown", startDrag);
    notch.addEventListener("touchstart", startDrag);

    let counterDragging = false;
    let counterOffsetX = 0, counterOffsetY = 0;

    function startCounterDrag(e) {
      counterDragging = true;
      const rect = counterWindow.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      counterOffsetX = clientX - rect.left;
      counterOffsetY = clientY - rect.top;
    }

    function dragCounter(e) {
      if (!counterDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      let x = clientX - counterOffsetX;
      let y = clientY - counterOffsetY;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const rect = counterWindow.getBoundingClientRect();
      const maxX = vw - rect.width;
      const maxY = vh - rect.height;
      x = Math.max(0, Math.min(x, maxX));
      y = Math.max(0, Math.min(y, maxY));
      counterWindow.style.left = x + "px";
      counterWindow.style.top = y + "px";
    }

    function stopCounterDrag() { counterDragging = false; }

    counterDragHandle.addEventListener("mousedown", startCounterDrag);
    document.addEventListener("mousemove", dragCounter);
    document.addEventListener("mouseup", stopCounterDrag);
    counterDragHandle.addEventListener("touchstart", startCounterDrag);
    document.addEventListener("touchmove", dragCounter, { passive: false });
    document.addEventListener("touchend", stopCounterDrag);

    function getClientInfo() {
      return {
        name: clientName ? clientName.value.trim() || 'Not provided' : 'Not provided',
        business: clientBusiness ? clientBusiness.value.trim() || 'Not provided' : 'Not provided',
        phone: clientPhone ? clientPhone.value.trim() || 'Not provided' : 'Not provided'
      };
    }

    function generateRequestMessage(info) {
      return `Website Request

Client Name: ${info.name}
Business Name: ${info.business}
Phone Number: ${info.phone}

Requested Website

Base Price Shown:
৳${PRICES.base}`;
    }

    function generateCounterOfferMessage(info, price, message) {
      return `Counter Offer for Website

Name: ${info.name}
Business: ${info.business}
Phone: ${info.phone}

Offered Price:
${price ? '৳' + price : 'Not specified'}

Message:
${message || 'No message'}`;
    }

    function openWhatsApp(text) {
      const encoded = encodeURIComponent(text);
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`, '_blank');
    }

    if (sendRequestBtn) {
      sendRequestBtn.addEventListener('click', () => {
        const info = getClientInfo();
        const msg = generateRequestMessage(info);
        openWhatsApp(msg);
      });
    }

    if (counterOfferBtn) {
      counterOfferBtn.addEventListener('click', () => {
        counterWindow.classList.add('visible');
        const mainRect = widget.getBoundingClientRect();
        let left = mainRect.right + 10;
        let top = mainRect.top;
        const winW = counterWindow.offsetWidth;
        const winH = counterWindow.offsetHeight;
        if (left + winW > window.innerWidth) {
          left = mainRect.left - winW - 10;
        }
        if (left < 0) left = 20;
        if (top + winH > window.innerHeight) {
          top = window.innerHeight - winH - 20;
        }
        if (top < 0) top = 20;
        counterWindow.style.left = left + 'px';
        counterWindow.style.top = top + 'px';
      });
    }

    if (closeCounterBtn) {
      closeCounterBtn.addEventListener('click', () => {
        counterWindow.classList.remove('visible');
      });
    }

    if (sendCounterOfferBtn) {
      sendCounterOfferBtn.addEventListener('click', () => {
        const info = getClientInfo();
        const price = offerPrice.value.trim();
        const message = offerMessage.value.trim();
        const counterMsg = generateCounterOfferMessage(info, price, message);
        openWhatsApp(counterMsg);

        counterWindow.classList.remove('visible');
        offerPrice.value = '';
        offerMessage.value = '';
      });
    }
  })();
</script>

</body>
</html>
